        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
        }
        (function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark');
                document.getElementById('theme-toggle').textContent = '☀️';
            }
        })();

        function formatNum(n) { if (n >= 1000000) return (n/1000000).toFixed(1) + 'M'; if (n >= 1000) return (n/1000).toFixed(1) + 'K'; return n.toString(); }
        function getStarString(count) { return '★'.repeat(count) + '☆'.repeat(5 - count); }

        function getAvatar(name) {
            const colors = ['1abc9c','2ecc71','3498db','9b59b6','34495e','16a085','27ae60','2980b9','8e44ad','2c3e50','f1c40f','e67e22','e74c3c','95a5a6'];
            const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            const color = colors[[...name].reduce((a, b) => a + b.charCodeAt(0), 0) % colors.length];
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128"><rect width="128" height="128" fill="#${color}" rx="64"/><text x="64" y="82" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="52" font-weight="bold" fill="#fff" text-anchor="middle">${initials}</text></svg>`;
            return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
        }

            </div>`;
        }

        function initDetail() {
            const p = new URLSearchParams(window.location.search);
            const appKey = p.get('app') || 'minecraft';
            const data = appsData[appKey];
            if (!data) {
                document.getElementById('detail-page').innerHTML = '<h2 style="text-align:center;padding:40px;">Приложение не найдено</h2><a href="index.html" class="back-btn">← Назад</a>';
                return;
            }

            document.getElementById('detail-name').textContent = data.name;
            document.getElementById('detail-category').textContent = data.cat + ' • ' + data.size + ' • Версия ' + data.ver;
            document.getElementById('detail-rating').textContent = '★ ' + data.rating;
            document.getElementById('detail-desc-text').textContent = data.desc;
            document.getElementById('detail-features').innerHTML = data.features.map(f => `<span class="feature-tag">${f}</span>`).join('');

            const iconContainer = document.getElementById('detail-icon');
            const ssContainer = document.getElementById('detail-screenshots');
            iconContainer.innerHTML = '';
            ssContainer.innerHTML = '';

            if (data.iconUrl) {
                const img = document.createElement('img');
                img.src = data.iconUrl;
                img.width = 100; img.height = 100;
                img.style.borderRadius = '24px';
                img.style.objectFit = 'cover';
                img.style.boxShadow = '0 4px 16px rgba(0,0,0,0.15)';
                img.onerror = function() {
                    iconContainer.innerHTML = data.icon;
                    iconContainer.style.fontSize = '48px';
                    iconContainer.style.background = 'var(--bg)';
                };
                iconContainer.appendChild(img);
            } else {
                iconContainer.textContent = data.icon;
                iconContainer.style.fontSize = '48px';
                iconContainer.style.background = 'var(--bg)';
            }

            if (data.screens && data.screens.length > 0) {
                data.screens.forEach((src, i) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'ss-item';
                    wrap.style.minWidth = '160px';
                    wrap.style.height = '320px';
                    wrap.style.borderRadius = '16px';
                    wrap.style.overflow = 'hidden';
                    wrap.style.border = '1px solid var(--border)';
                    wrap.style.flexShrink = '0';
                    
                    const img = document.createElement('img');
                    img.src = src;
                    img.style.width = '100%';
                    img.style.height = '100%';
                    img.style.objectFit = 'cover';
                    img.style.display = 'block';
                    img.loading = 'lazy';
                    img.onerror = function() {
                        wrap.outerHTML = createScreenFallback(data.name, 'Screen ' + (i+1));
                    };
                    
                    wrap.appendChild(img);
                    ssContainer.appendChild(wrap);
                });
            } else {
                for (let i = 1; i <= 3; i++) {
                    ssContainer.innerHTML += createScreenFallback(data.name, 'Screen ' + i);
                }
            }

            const dlKey = 'dl_' + appKey;
            let dl = localStorage.getItem(dlKey);
            if (!dl) { dl = Math.floor(Math.random() * 45000) + 5000; localStorage.setItem(dlKey, dl); }
            document.getElementById('detail-downloads').textContent = '⬇️ ' + formatNum(parseInt(dl));

            const appReviews = reviewsDB[appKey] || [];
            document.getElementById('reviews-list').innerHTML = appReviews.map(rev => {
                const avatar = getAvatar(rev.name);
                return `<div class="review-card"><img src="${avatar}" class="review-avatar" loading="lazy"><div class="review-body"><div class="review-header"><b>${rev.name}</b><span class="review-time">${rev.time}</span></div><div class="review-stars">${getStarString(rev.stars)}</div><div class="review-text">${rev.text}</div></div></div>`;
            }).join('');

            const savedRef = localStorage.getItem('ref');
            const savedSig = localStorage.getItem('sig');
            document.getElementById('detail-get-btn').href = savedRef && savedSig ? `contact-v2.html?ref=${encodeURIComponent(savedRef)}&sig=${encodeURIComponent(savedSig)}` : 'contact-v2.html';
        }
        initDetail();
    </script>
</body>
</html>
